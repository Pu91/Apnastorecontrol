<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Review Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

  <h2 class="text-2xl font-bold mb-6">Admin Review Approval</h2>

  <div id="reviewList" class="space-y-4"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  query, where, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "apna-store-4e151.firebaseapp.com",
  projectId: "apna-store-4e151",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

loadPendingReviews();

/* LOAD PENDING */
async function loadPendingReviews(){
  const q = query(
    collection(db,"reviews"),
    where("approved","==",false)
  );

  const snap = await getDocs(q);
  const container = document.getElementById("reviewList");

  if(snap.empty){
    container.innerHTML = "No pending reviews";
    return;
  }

  let html="";

  snap.forEach(d=>{
    const r = d.data();

    html+=`
      <div class="bg-white p-4 rounded shadow">
        <p><b>${r.user_name}</b></p>
        <p>${"⭐".repeat(r.rating)}</p>
        <p>${r.comment || ""}</p>

        <div class="mt-3 flex gap-3">
          <button onclick="approve('${d.id}')"
          class="bg-green-600 text-white px-4 py-2 rounded">
            Approve
          </button>

          <button onclick="reject('${d.id}')"
          class="bg-red-600 text-white px-4 py-2 rounded">
            Delete
          </button>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* APPROVE */
window.approve = async (id)=>{
  await updateDoc(doc(db,"reviews",id),{
    approved:true
  });

  alert("Approved ✅");
  loadPendingReviews();
};

/* DELETE */
window.reject = async (id)=>{
  await updateDoc(doc(db,"reviews",id),{
    approved:"rejected"
  });

  alert("Deleted ❌");
  loadPendingReviews();
};
</script>

</body>
</html>
